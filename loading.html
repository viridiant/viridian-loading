<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>A Colheita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Roboto+Condensed:wght@300;400;700&family=Caveat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#0D0D12;
  color:#D4C8B0;
  font-family:'Roboto Condensed',sans-serif;
}

/* --- Animations --- */
@keyframes fog-drift-1{
  0%{transform:translateX(-10%) translateY(0)}
  50%{transform:translateX(10%) translateY(-3%)}
  100%{transform:translateX(-10%) translateY(0)}
}
@keyframes fog-drift-2{
  0%{transform:translateX(10%) translateY(-2%)}
  50%{transform:translateX(-10%) translateY(2%)}
  100%{transform:translateX(10%) translateY(-2%)}
}
@keyframes ember-rise{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:0.8}
  90%{opacity:0.3}
  100%{transform:translateY(-100vh) translateX(30px);opacity:0}
}
@keyframes ritual-rotate{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
@keyframes ritual-pulse{
  0%,100%{opacity:0.03}
  50%{opacity:0.08}
}
@keyframes root-grow{
  0%{stroke-dashoffset:1000}
  100%{stroke-dashoffset:0}
}
@keyframes flicker{
  0%,100%{opacity:1}42%{opacity:1}43%{opacity:0.85}44%{opacity:1}
  72%{opacity:1}73%{opacity:0.7}73.5%{opacity:1}74%{opacity:0.9}74.5%{opacity:1}
}
@keyframes burn-glow{
  0%,100%{text-shadow:0 0 10px rgba(139,0,0,0.4),0 0 20px rgba(139,0,0,0.2)}
  50%{text-shadow:0 0 20px rgba(139,0,0,0.7),0 0 40px rgba(139,0,0,0.4),0 0 60px rgba(212,165,116,0.2)}
}
@keyframes vignette-breathe{
  0%,100%{opacity:0.8}
  50%{opacity:1}
}
@keyframes progress-shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(200%)}
}
@keyframes grain{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-2%,-2%)}20%{transform:translate(1%,3%)}
  30%{transform:translate(-3%,1%)}40%{transform:translate(3%,-1%)}
  50%{transform:translate(-1%,2%)}60%{transform:translate(2%,-3%)}
  70%{transform:translate(-2%,1%)}80%{transform:translate(1%,-2%)}
  90%{transform:translate(-1%,3%)}
}
@keyframes spiral-draw{
  0%{stroke-dashoffset:126}
  100%{stroke-dashoffset:0}
}
@keyframes spiral-draw-sm{
  0%{stroke-dashoffset:82}
  100%{stroke-dashoffset:0}
}
@keyframes spiral-draw-xs{
  0%{stroke-dashoffset:38}
  100%{stroke-dashoffset:0}
}
@keyframes eye-blink{
  0%,40%,44%,100%{transform:scaleY(1)}
  42%{transform:scaleY(0.1)}
}
@keyframes fade-in{
  0%{opacity:0;transform:translateY(15px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes fade-in-blur{
  0%{opacity:0;filter:blur(10px);transform:scale(0.8)}
  100%{opacity:1;filter:blur(0);transform:scale(1)}
}
@keyframes ink-appear{
  0%{opacity:0;filter:blur(4px)}
  100%{opacity:0.5;filter:blur(0)}
}
@keyframes static-flash{
  0%{opacity:0.7}15%{opacity:0.9}30%{opacity:0.5}
  45%{opacity:1}60%{opacity:0.6}75%{opacity:0.95}
  90%{opacity:0.4}100%{opacity:0}
}

/* --- Eldritch overlay --- */
.eldritch-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:50;opacity:0;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  background:rgba(30,5,5,0.6);
  transition:opacity 80ms ease-out;
}
.eldritch-overlay.active{
  opacity:1;
  animation:static-flash 200ms steps(4) forwards;
}
.eldritch-overlay .flash-grain{
  position:absolute;top:0;left:0;width:100%;height:100%;
  opacity:0.15;
}
.eldritch-overlay .flash-symbol{
  position:relative;z-index:1;
  width:clamp(120px,30vw,220px);height:clamp(120px,30vw,220px);
  filter:drop-shadow(0 0 30px rgba(139,0,0,0.8)) drop-shadow(0 0 60px rgba(80,0,0,0.4));
}

/* --- Layers --- */
.screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  overflow:hidden;
  background:radial-gradient(ellipse at center,#2C2416 0%,#15110A 40%,#0D0D12 100%);
}
.layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.grain{opacity:0.04;animation:grain 0.5s steps(5) infinite}
.fog1{
  background:linear-gradient(180deg,transparent 0%,rgba(74,80,67,0.08) 40%,rgba(74,80,67,0.15) 70%,transparent 100%);
  animation:fog-drift-1 25s ease-in-out infinite;
}
.fog2{
  background:linear-gradient(200deg,transparent 0%,rgba(44,36,22,0.1) 30%,rgba(74,80,67,0.12) 60%,transparent 100%);
  animation:fog-drift-2 35s ease-in-out infinite;
}
.vignette{
  background:radial-gradient(ellipse at center,transparent 30%,rgba(13,13,18,0.6) 70%,rgba(13,13,18,0.95) 100%);
  animation:vignette-breathe 10s ease-in-out infinite;
}
.flicker-layer{animation:flicker 8s ease-in-out infinite}

/* --- Ritual symbols --- */
.ritual-sym{position:absolute;color:#D4C8B0}

/* --- Embers --- */
.ember{position:absolute;border-radius:50%;bottom:5%}

/* --- Content --- */
.content{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;padding:0 24px;
}
.logo{
  font-family:'Crimson Text',serif;
  font-size:clamp(2rem,6vw,3.75rem);
  font-weight:700;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:#D4C8B0;
  animation:fade-in-blur 2s ease-out both,burn-glow 4s ease-in-out infinite;
  user-select:none;
  margin-bottom:12px;
}
.logo svg{display:inline-block;vertical-align:baseline;margin:0 -2px}
.subtitle{
  font-family:'Caveat',cursive;
  font-size:clamp(1.1rem,3vw,1.5rem);
  color:rgba(212,165,116,0.8);
  animation:fade-in 1s ease-out 1.5s both;
  user-select:none;
  margin-bottom:20px;
}
.server-info{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  color:rgba(139,115,85,0.4);
  animation:fade-in 1s ease-out 1.8s both;
  margin-bottom:28px;
  display:flex;align-items:center;gap:12px;
}
.server-info .sep{color:rgba(139,0,0,0.4)}

/* --- Progress --- */
.progress-wrap{
  width:100%;max-width:400px;
  animation:fade-in 0.8s ease-out 2.1s both;
  margin-bottom:10px;
}
.progress-track{
  height:6px;
  background:rgba(44,36,22,0.5);
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(139,115,85,0.1);
}
.progress-bar{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,#4A1C1C,#8B0000,#6B0F1A);
  position:relative;
  transition:width 0.5s ease-out;
  width:0%;
}
.progress-bar::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(212,165,116,0.4),transparent);
  animation:progress-shimmer 2s linear infinite;
}
.progress-labels{
  display:flex;justify-content:space-between;margin-top:6px;
  font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(139,115,85,0.5);
}

/* --- File --- */
.current-file{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  color:rgba(139,115,85,0.3);
  height:18px;margin-bottom:28px;text-align:center;
  animation:fade-in 0.8s ease-out 2.4s both;
  max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* --- Tips --- */
.tips{
  width:100%;max-width:480px;min-height:60px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  animation:fade-in 0.8s ease-out 2.7s both;
  margin-bottom:28px;
}
.tip-category{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:0.2em;
  color:rgba(139,115,85,0.4);margin-bottom:4px;
}
.tip-text{
  font-family:'Roboto Condensed',sans-serif;font-size:14px;
  color:rgba(212,200,176,0.7);font-style:italic;line-height:1.5;
  transition:opacity 0.5s ease;
}

/* --- Handwritten note --- */
.hand-note{
  font-family:'Caveat',cursive;font-size:14px;
  color:rgba(212,165,116,0.4);
  transform:rotate(-2deg);user-select:none;
  animation:ink-appear 2s ease-out 4s both;
}
</style>
</head>

</div>

<script>
// --- Tips ---
var tips = [
  {t:"Os sussurros entre as espigas nem sempre v\u00eam do vento.",c:"Sussurro"},
  {t:"N\u00e3o colha o que n\u00e3o plantou. A terra lembra.",c:"Aviso"},
  {t:"Dizem que o velho celeiro guarda mais do que gr\u00e3os.",c:"Lenda"},
  {t:"A neblina \u00e9 mais densa onde a terra foi profanada.",c:"Sussurro"},
  {t:"Cuidado com os caminhos que desaparecem ao anoitecer.",c:"Aviso"},
  {t:"H\u00e1 quem diga que os espantalhos mudam de lugar \u00e0 noite.",c:"Lenda"},
  {t:"O cheiro de terra molhada \u00e0s vezes esconde algo podre.",c:"Sussurro"},
  {t:"As ra\u00edzes crescem mais fundo do que qualquer um imagina.",c:"Aviso"},
  {t:"A \u00faltima colheita nunca foi como as outras.",c:"Lenda"},
  {t:"Ou\u00e7a o canto dos corvos \u2014 eles sabem o que vem.",c:"Sussurro"},
  {t:"Use /roll para testes de habilidade durante o roleplay.",c:"Dica"},
  {t:"Mantenha-se no personagem \u2014 use /looc para falar fora do RP.",c:"Dica"},
  {t:"Verifique o quadro de avisos na pra\u00e7a para eventos da comunidade.",c:"Dica"},
  {t:"Respeite o espa\u00e7o dos outros jogadores durante cenas de RP.",c:"Dica"},
  {t:"Seu invent\u00e1rio \u00e9 limitado \u2014 priorize o essencial.",c:"Dica"},
  {t:"Converse com os NPCs \u2014 alguns t\u00eam informa\u00e7\u00f5es valiosas.",c:"Dica"},
  {t:"A economia local depende da sua participa\u00e7\u00e3o. Negocie.",c:"Dica"},
  {t:"N\u00e3o saia de uma cena de RP sem motivo. Use /looc se precisar.",c:"Dica"},
  {t:"Documente suas descobertas. O di\u00e1rio do personagem ajuda.",c:"Dica"},
  {t:"Explore os arredores da fazenda com cuidado ao anoitecer.",c:"Dica"}
];
var tipIdx = 0;
var tipCat = document.getElementById("tip-category");
var tipText = document.getElementById("tip-text");
function showTip(){
  var tip = tips[tipIdx];
  tipCat.textContent = tip.c;
  tipText.style.opacity = "0";
  setTimeout(function(){
    tipText.textContent = "\u201C" + tip.t + "\u201D";
    tipText.style.opacity = "1";
  }, 300);
  tipIdx = (tipIdx + 1) % tips.length;
}
showTip();
setInterval(showTip, 8000);

// --- Embers ---
var embersEl = document.getElementById("embers");
for(var i = 0; i < 14; i++){
  var e = document.createElement("div");
  e.className = "ember";
  e.style.left = (5 + (i * 7) % 90) + "%";
  e.style.width = e.style.height = (2 + i % 3) + "px";
  e.style.backgroundColor = i % 3 === 0 ? "#8B0000" : "#D4A574";
  e.style.opacity = (0.3 + (i % 4) * 0.15);
  e.style.animation = "ember-rise " + (8 + (i % 5) * 1.5) + "s ease-out " + (i * 0.8) + "s infinite";
  embersEl.appendChild(e);
}

// --- GMod callbacks ---
var filesTotal = 0;
var filesNeeded = 0;
var progressBar = document.getElementById("progress-bar");
var progressPct = document.getElementById("progress-pct");
var currentFile = document.getElementById("current-file");
var mapnameEl = document.getElementById("mapname");
var maxplayersEl = document.getElementById("maxplayers");

function updateProgress(){
  if(filesTotal === 0) return;
  var pct = Math.min(100, ((filesTotal - filesNeeded) / filesTotal) * 100);
  progressBar.style.width = pct + "%";
  progressPct.textContent = Math.round(pct) + "%";
}

function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode){
  if(mapname) mapnameEl.textContent = mapname;
  if(maxplayers) maxplayersEl.textContent = maxplayers;
}

function SetFilesTotal(total){
  filesTotal = total;
  updateProgress();
}

function SetFilesNeeded(needed){
  filesNeeded = needed;
  updateProgress();
}

function DownloadingFile(filename){
  if(!filename) return;
  var parts = filename.split("/");
  var name = parts[parts.length - 1];
  currentFile.textContent = name.length > 40 ? "..." + name.slice(-37) : name;
}

// --- URL params fallback ---
var params = new URLSearchParams(window.location.search);
if(params.get("mapname")) mapnameEl.textContent = params.get("mapname");
if(params.get("maxplayers")) maxplayersEl.textContent = params.get("maxplayers");

// --- Static noise audio ---
var audioCtx = null;
function playStatic(duration){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var sampleRate = audioCtx.sampleRate;
  var samples = Math.floor(sampleRate * (duration + 80) / 1000);
  var buffer = audioCtx.createBuffer(1, samples, sampleRate);
  var data = buffer.getChannelData(0);
  for(var i = 0; i < samples; i++){
    data[i] = (Math.random() * 2 - 1) * 0.3;
  }
  var src = audioCtx.createBufferSource();
  src.buffer = buffer;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + (duration + 80) / 1000);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

// --- Eldritch flash scare ---
var eldritchPool = document.querySelectorAll("#eldritch-pool > svg");
var eldritchOverlay = document.getElementById("eldritch-overlay");
var flashSymbol = document.getElementById("flash-symbol");
var flashActive = false;

function triggerFlash(){
  if(document.hidden || flashActive || eldritchPool.length === 0) return;
  flashActive = true;
  var idx = Math.floor(Math.random() * eldritchPool.length);
  var svg = eldritchPool[idx].cloneNode(true);
  svg.style.width = "100%";
  svg.style.height = "100%";
  flashSymbol.innerHTML = "";
  flashSymbol.appendChild(svg);
  eldritchOverlay.classList.add("active");
  var duration = 100 + Math.floor(Math.random() * 100);
  playStatic(duration);
  setTimeout(function(){
    eldritchOverlay.classList.remove("active");
    setTimeout(function(){
      flashSymbol.innerHTML = "";
      flashActive = false;
    }, 80);
  }, duration);
}

setTimeout(function(){
  setInterval(function(){
    if(Math.random() < 0.2) triggerFlash();
  }, 20000);
}, 15000);
</script>
